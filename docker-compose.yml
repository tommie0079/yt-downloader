version: "3.8"

services:
  yt-downloader:
    build: .
    container_name: yt-downloader
    ports:
      - "7842:7842"
    volumes:
      # === Synology NAS ===
      - /volume1/hdd/youtube:/downloads
      - /volume1/docker/yt-downloader/data:/app/data
      # === Windows (comment out above, uncomment below) ===
      #- C:/Users/Tommie/Downloads/downloads:/downloads
      #- ./data:/app/data
      # YouTube cookies file (place cookies.txt in the data dir)
      # Export from browser using: https://github.com/yt-dlp/yt-dlp/wiki/FAQ#how-do-i-pass-cookies-to-yt-dlp
    environment:
      - DOWNLOAD_DIR=/downloads
      - CHECK_INTERVAL_MINUTES=30      # How often to check for new videos
      # ── Notifications (optional) ──
      # - DISCORD_WEBHOOK_URL=https://discord.com/api/webhooks/...
      # - TELEGRAM_BOT_TOKEN=your-bot-token
      # - TELEGRAM_CHAT_ID=your-chat-id
    restart: unless-stopped
